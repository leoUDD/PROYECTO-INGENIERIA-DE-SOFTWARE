{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Misión Emprende UDD — Orden de presentación</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilo_orden_presentacion.css' %}">

  <style>
    .acciones-listo{
      margin-top: 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .btn-listo{
      border:none;
      border-radius:14px;
      padding:14px 28px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      background:#6c63ff;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      transition:transform .15s ease, opacity .15s ease;
    }

    .btn-listo:hover{
      transform:translateY(-1px);
    }

    .btn-listo:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .estado-listos{
      margin:0;
      font-weight:700;
      color:#cfd8e3;
      text-align:center;
    }

    .panel-sorteo{
  position: relative;
  width: 100%;
  min-height: 560px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  padding: 28px 24px 20px;
  overflow:hidden;
}

    .flash-sorteo{
      position:absolute;
      inset:0;
      background:rgba(255,255,255,.97);
      opacity:0;
      pointer-events:none;
      z-index:20;
      transition:opacity .18s ease;
    }

    .flash-sorteo.visible{
      opacity:1;
    }

    .sorteo-stage{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      transition:opacity .3s ease, transform .3s ease;
    }

    .sorteo-stage.oculto{
      opacity:0;
      transform:translateY(-8px);
      pointer-events:none;
      height:0;
      overflow:hidden;
      margin:0;
      padding:0;
      min-height:0;
    }

    .resultado-stage{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      opacity:1;
      transition:opacity .3s ease, transform .3s ease;
    }

    .resultado-stage.oculto{
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      height:0;
      overflow:hidden;
      margin:0;
      padding:0;
      min-height:0;
    }

.vaso-wrap{
  position: relative;
  width: min(420px, 78vw);
  height: min(260px, 34vw);
  min-height: 210px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  margin: 8px auto 0;
  overflow: visible;
  flex: 0 0 auto;
}

.varitas{
  position:absolute;
  bottom:34px;
  left:50%;
  transform:translateX(-50%);
  width:min(260px, 54vw);
  height:min(170px, 30vw);
  min-width:190px;
  min-height:130px;
  pointer-events:none;
  z-index:2;
}

.varita{
  position:absolute;
  bottom:0;
  width:10px;
  height:105px;
  border-radius:999px;
  transform-origin: bottom center;
  box-shadow: 0 0 10px rgba(255,255,255,.18);
  transition:
    transform .35s ease,
    height .35s ease,
    filter .35s ease,
    bottom .35s ease;
}

    .varita::after{
      content:"";
      position:absolute;
      left:2px;
      right:2px;
      top:6px;
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,.32);
    }

    .varita-1{ background:linear-gradient(180deg,#f7d37a,#c6922d); }
    .varita-2{ background:linear-gradient(180deg,#7fc4ff,#2b79c2); }
    .varita-3{ background:linear-gradient(180deg,#ffa36d,#d96a28); }
    .varita-4{ background:linear-gradient(180deg,#d49cff,#8857d8); }
    .varita-5{ background:linear-gradient(180deg,#a0e67a,#4c9b35); }
    .varita-6{ background:linear-gradient(180deg,#ffd96a,#dfab22); }

.varita[data-slot="0"]{
  display:none;
}

.varita[data-slot="1"]{
  left:70px;
  transform:rotate(-14deg);
}

.varita[data-slot="2"]{
  left:105px;
  transform:rotate(-2deg);
}

.varita[data-slot="3"]{
  left:140px;
  transform:rotate(8deg);
}

.varita[data-slot="4"]{
  left:170px;
  transform:rotate(18deg);
}

.varita[data-slot="5"]{
  display:none;
}

    .varitas.sorteando .varita-1{ animation: tambaleo1 .55s ease-in-out infinite alternate; }
    .varitas.sorteando .varita-2{ animation: tambaleo2 .45s ease-in-out infinite alternate; }
    .varitas.sorteando .varita-3{ animation: tambaleo3 .5s ease-in-out infinite alternate; }
    .varitas.sorteando .varita-4{ animation: tambaleo4 .4s ease-in-out infinite alternate; }
    .varitas.sorteando .varita-5{ animation: tambaleo5 .52s ease-in-out infinite alternate; }
    .varitas.sorteando .varita-6{ animation: tambaleo6 .48s ease-in-out infinite alternate; }

    @keyframes tambaleo1 { from { transform:rotate(-38deg); } to { transform:rotate(-20deg); } }
    @keyframes tambaleo2 { from { transform:rotate(-20deg); } to { transform:rotate(-8deg); } }
    @keyframes tambaleo3 { from { transform:rotate(-8deg); } to { transform:rotate(2deg); } }
    @keyframes tambaleo4 { from { transform:rotate(2deg); } to { transform:rotate(12deg); } }
    @keyframes tambaleo5 { from { transform:rotate(12deg); } to { transform:rotate(24deg); } }
    @keyframes tambaleo6 { from { transform:rotate(26deg); } to { transform:rotate(38deg); } }

.varita.ganadora{
  z-index:5;
  height:158px;
  filter: drop-shadow(0 0 18px rgba(255, 190, 70, .65));
  animation: subirGanadora 1.05s ease forwards;
}
@keyframes subirGanadora{
  0%{
    bottom:0;
  }
  100%{
    bottom:34px;
  }
}

.vaso{
  position:relative;
  width: min(168px, 34vw);
  height: min(116px, 22vw);
  min-width: 128px;
  min-height: 92px;
  border-radius: 20px 20px 30px 30px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,.08));
  border:2px solid rgba(215,235,255,.74);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 10px 30px rgba(0,0,0,.2);
  overflow:hidden;
  backdrop-filter: blur(2px);
  z-index:3;
}

    .vaso::before{
      content:"";
      position:absolute;
      inset:10px auto 10px 10px;
      width:14px;
      background:rgba(255,255,255,.14);
      border-radius:999px;
      transform:skewX(-12deg);
    }

    .vaso::after{
      content:"";
      position:absolute;
      left:10px;
      right:10px;
      top:10px;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
    }

    .chispas{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
      transition:opacity .25s ease;
      z-index:7;
    }

    .chispas.visible{
      opacity:1;
    }

    .chispa{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#ffca6b;
      box-shadow:0 0 10px rgba(255, 202, 107, .85);
      animation: flotar .9s ease-out forwards;
    }

    .chispa.c2{ background:#8ed8ff; box-shadow:0 0 10px rgba(142,216,255,.85); }
    .chispa.c3{ background:#d8a1ff; box-shadow:0 0 10px rgba(216,161,255,.85); }

    @keyframes flotar{
      from { transform:translateY(0) scale(.8); opacity:0; }
      25% { opacity:1; }
      to { transform:translateY(-34px) scale(1.15); opacity:0; }
    }

    .estado-sorteo{
      min-height: 34px;
      font-size: 1rem;
      font-weight: 800;
      color: #ffb15a;
      text-align:center;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .dots{
      display:flex;
      gap:8px;
      justify-content:center;
      align-items:center;
      min-height:18px;
      flex: 0 0 auto;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#6f89a7;
      opacity:.4;
    }

    .dot.active{
      background:#7ccfff;
      opacity:1;
      box-shadow:0 0 12px rgba(124,207,255,.7);
    }

    .lista-orden-bonita{
      width:min(100%, 520px);
      margin: 14px auto 0;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex: 0 0 auto;
    }

    .fila-orden{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      color:#fff;
      animation: aparecerFila .35s ease;
    }

    @keyframes aparecerFila{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .numero-orden{
      width:32px;
      height:32px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      background:linear-gradient(135deg,#ffba55,#d88a1e);
      color:#18263d;
      flex:0 0 32px;
    }

    .nombre-orden{
      font-weight:700;
      flex:1;
      text-align:left;
    }

    .primero-tag{
      font-size:.8rem;
      font-weight:800;
      color:#ffcb74;
      white-space:nowrap;
    }

    .oculto{
      display:none !important;
    }

    @media (max-width: 900px){
  .panel-sorteo{
    min-height: 500px;
    padding: 20px 16px 16px;
  }
}

@media (max-width: 640px){
  .panel-sorteo{
    min-height: 430px;
  }

  .vaso-wrap{
    width: min(320px, 86vw);
    height: 220px;
    min-height: 180px;
  }

  .vaso{
    width: min(140px, 42vw);
    height: min(98px, 24vw);
  }

  .varitas{
    width: min(220px, 64vw);
    height: 140px;
    bottom: 28px;
  }
}



  </style>
</head>
<body>
  <main class="contenedor">
    <section class="card">
      <h1 class="titulo">Orden de presentación</h1>
      <p class="subtexto">
        El profesor realizará el sorteo del orden en que cada equipo presentará su pitch.
      </p>

      <div id="panelOrden" class="lista">
        <div class="flash-sorteo" id="flashSorteo"></div>

        <div class="panel-sorteo">
          <div id="sorteoStage" class="sorteo-stage">
            <div class="vaso-wrap">
              <div class="varitas" id="varitas">
                <div class="varita varita-1" data-slot="0"></div>
                <div class="varita varita-2" data-slot="1"></div>
                <div class="varita varita-3" data-slot="2"></div>
                <div class="varita varita-4" data-slot="3"></div>
                <div class="varita varita-5" data-slot="4"></div>
                <div class="varita varita-6" data-slot="5"></div>
              </div>

              <div class="vaso"></div>

              <div class="chispas" id="chispas">
                <span class="chispa" style="left:34%; bottom:120px;"></span>
                <span class="chispa c2" style="left:44%; bottom:138px;"></span>
                <span class="chispa c3" style="left:57%; bottom:130px;"></span>
                <span class="chispa" style="left:64%; bottom:114px;"></span>
              </div>
            </div>

            <div id="estadoAnimacionSorteo" class="estado-sorteo">
              Esperando el sorteo
            </div>

            <div id="dotsSorteo" class="dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>

          <div id="resultadoStage" class="resultado-stage oculto">
            <div id="listaOrdenBonita" class="lista-orden-bonita"></div>
          </div>
        </div>
      </div>

      <div class="estado-fase" id="estadoFaseTexto"></div>

      <div class="acciones-listo" id="accionesListoOrden">
        <button id="btnOrdenListo" class="btn-listo">¡Estoy listo!</button>
        <p id="ordenListoEstado" class="estado-listos">0/0 grupos listos</p>
      </div>
    </section>
  </main>

  <audio id="audioSorteoAgitar" preload="auto">
    <source src="{% static 'sounds/sorteo_varitas.mp3' %}" type="audio/mpeg">
  </audio>
  <audio id="audioSorteoReveal" preload="auto">
    <source src="{% static 'sounds/sorteo_reveal.mp3' %}" type="audio/mpeg">
  </audio>

  <script>
    const sesionId = "{{ grupo.sesion.idsesion }}";
    const grupoId = "{{ grupo.idgrupo }}";
    const btnOrdenListo = document.getElementById("btnOrdenListo");
    const ordenListoEstado = document.getElementById("ordenListoEstado");
    const accionesListoOrden = document.getElementById("accionesListoOrden");
    const varitasEl = document.getElementById("varitas");
    const chispasEl = document.getElementById("chispas");
    const estadoAnimacionSorteo = document.getElementById("estadoAnimacionSorteo");
    const dotsSorteo = document.getElementById("dotsSorteo");
    const listaOrdenBonita = document.getElementById("listaOrdenBonita");
    const flashSorteo = document.getElementById("flashSorteo");
    const sorteoStage = document.getElementById("sorteoStage");
    const resultadoStage = document.getElementById("resultadoStage");
    const audioSorteoAgitar = document.getElementById("audioSorteoAgitar");
    const audioSorteoReveal = document.getElementById("audioSorteoReveal");

    let ordenSorteadoPrevio = false;
    let animacionActiva = false;
    let ultimoOrdenRenderizado = "";

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith(name + "=")) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    function reproducirAudio(el) {
      if (!el) return;
      try {
        el.currentTime = 0;
        el.play().catch(() => {});
      } catch (_) {}
    }

    function setDots(activo) {
      if (!dotsSorteo) return;
      const dots = dotsSorteo.querySelectorAll(".dot");
      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === activo);
      });
    }

    function mostrarSoloAnimacion() {
      if (sorteoStage) sorteoStage.classList.remove("oculto");
      if (resultadoStage) resultadoStage.classList.add("oculto");
    }

    function mostrarSoloResultado() {
      if (sorteoStage) sorteoStage.classList.add("oculto");
      if (resultadoStage) resultadoStage.classList.remove("oculto");
    }

    function resetVisualSorteo() {
      if (varitasEl) {
        varitasEl.classList.remove("sorteando");
        varitasEl.querySelectorAll(".varita").forEach(v => v.classList.remove("ganadora"));
      }
      if (chispasEl) chispasEl.classList.remove("visible");
      if (flashSorteo) flashSorteo.classList.remove("visible");
      if (listaOrdenBonita) {
        listaOrdenBonita.innerHTML = "";
      }
      if (estadoAnimacionSorteo) estadoAnimacionSorteo.textContent = "Esperando el sorteo";
      setDots(0);
      ultimoOrdenRenderizado = "";
      mostrarSoloAnimacion();
    }

    function serializarOrden(ordenPitch, grupoActual) {
      return JSON.stringify({
        ordenPitch: ordenPitch || [],
        grupoActualId: grupoActual ? Number(grupoActual.id) : null
      });
    }

    function renderOrdenBonito(ordenPitch, grupoActual) {
      if (!listaOrdenBonita) return;

      const firma = serializarOrden(ordenPitch, grupoActual);
      if (firma === ultimoOrdenRenderizado) return;

      listaOrdenBonita.innerHTML = (ordenPitch || []).map(item => {
        const esActual = grupoActual && Number(grupoActual.id) === Number(item.id);
        return `
          <div class="fila-orden">
            <div class="numero-orden">${item.orden}</div>
            <div class="nombre-orden">${item.nombre}</div>
            ${esActual ? `<div class="primero-tag">primer turno</div>` : ``}
          </div>
        `;
      }).join("");

      ultimoOrdenRenderizado = firma;
    }

    function elegirVaritaGanadora() {
  return 2;
}

    function mostrarAnimacionSorteo(ordenPitch, grupoActual) {
      if (animacionActiva) return;
      animacionActiva = true;

      mostrarSoloAnimacion();

      if (listaOrdenBonita) {
        listaOrdenBonita.innerHTML = "";
      }

      if (estadoAnimacionSorteo) estadoAnimacionSorteo.textContent = "Sorteando...";
      setDots(1);

      if (varitasEl) {
        varitasEl.classList.add("sorteando");
        varitasEl.querySelectorAll(".varita").forEach(v => v.classList.remove("ganadora"));
      }

      reproducirAudio(audioSorteoAgitar);

      setTimeout(() => {
        if (estadoAnimacionSorteo) estadoAnimacionSorteo.textContent = "Y el primero es...";
        if (chispasEl) chispasEl.classList.add("visible");

        const indiceGanador = elegirVaritaGanadora(ordenPitch);
        const varitas = varitasEl ? varitasEl.querySelectorAll(".varita") : [];
        if (varitas[indiceGanador]) {
          varitas[indiceGanador].classList.add("ganadora");
        }

        setDots(2);
      }, 1500);

      setTimeout(() => {
  if (flashSorteo) flashSorteo.classList.add("visible");
  reproducirAudio(audioSorteoReveal);
}, 2400);

setTimeout(() => {
  if (varitasEl) varitasEl.classList.remove("sorteando");
}, 3000);

setTimeout(() => {
  if (flashSorteo) flashSorteo.classList.remove("visible");
  renderOrdenBonito(ordenPitch, grupoActual);
  mostrarSoloResultado();
  animacionActiva = false;
}, 3550);
    }

    function renderEstadoFase(data) {
      const estado = document.getElementById("estadoFaseTexto");
      if (!estado) return;

      if (data.faseActual === "f4_orden_pitch") {
        if (!data.ordenSorteado) {
          estado.textContent = "Cuando todos los equipos estén listos, se realizará el sorteo del orden de presentación.";
        } else {
          estado.textContent = "El orden ya fue sorteado. Cuando todos los equipos estén listos nuevamente, comenzará la ronda de presentaciones.";
        }

        if (accionesListoOrden) {
          accionesListoOrden.style.display = "flex";
        }

        if (ordenListoEstado) {
          ordenListoEstado.textContent = `${data.gruposListosF4Orden || 0}/${data.totalGrupos || 0} grupos listos`;
        }

        const miGrupo = (data.grupos || []).find(g => Number(g.id) === Number(grupoId));
        const yaListo = miGrupo?.listoF4Orden;

        if (btnOrdenListo) {
          btnOrdenListo.disabled = !!yaListo;
          btnOrdenListo.textContent = yaListo ? "Listo ✓" : "¡Estoy listo!";
        }
      } else if (data.faseActual === "f4_presentacion_pitch") {
        estado.textContent = "La presentación ha comenzado.";

        if (accionesListoOrden) {
          accionesListoOrden.style.display = "none";
        }
      } else {
        estado.textContent = "";
        if (accionesListoOrden) {
          accionesListoOrden.style.display = "none";
        }
      }
    }

    async function marcarListoOrden() {
      try {
        const resp = await fetch(`/grupo/${grupoId}/listo/`, {
          method: "POST",
          headers: {
            "X-CSRFToken": getCookie("csrftoken"),
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({})
        });

        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          console.error("Error al marcar listo:", data);
          return;
        }

        await cargarOrden();
      } catch (error) {
        console.error("Error marcando listo en orden:", error);
      }
    }

    async function cargarOrden() {
      try {
        const res = await fetch(`/sesion/${sesionId}/estado-presentacion/`, {
          credentials: "same-origin",
          cache: "no-store"
        });

        const data = await res.json();

        if (!res.ok || !data.ok) return;

        if (data.faseActual === "f4_presentacion_pitch") {
          window.location.replace("{% url 'presentar_pitch' %}");
          return;
        }

        if (data.faseActual && data.faseActual !== "f4_orden_pitch") {
          if (data.rutaAlumno) {
            window.location.replace(data.rutaAlumno);
            return;
          }
        }

        if (!data.ordenSorteado) {
          resetVisualSorteo();
          ordenSorteadoPrevio = false;
        }

        if (data.ordenSorteado && !ordenSorteadoPrevio && data.ordenPitch && data.ordenPitch.length) {
          ordenSorteadoPrevio = true;
          mostrarAnimacionSorteo(data.ordenPitch, data.grupoActual);
          renderEstadoFase(data);
          return;
        }

        ordenSorteadoPrevio = !!data.ordenSorteado;

        if (data.ordenSorteado && data.ordenPitch && data.ordenPitch.length && !animacionActiva) {
          renderOrdenBonito(data.ordenPitch, data.grupoActual);
          mostrarSoloResultado();
        }

        renderEstadoFase(data);
      } catch (error) {
        console.error("Error cargando orden:", error);
      }
    }

    if (btnOrdenListo) {
      btnOrdenListo.addEventListener("click", marcarListoOrden);
    }

    document.addEventListener("DOMContentLoaded", cargarOrden);
    setInterval(cargarOrden, 1500);
  </script>

  {% include "includes/sincronizacion_fase.html" %}
</body>
</html>
