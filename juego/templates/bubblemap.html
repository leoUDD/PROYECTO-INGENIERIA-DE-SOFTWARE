{% load static %}
{% include "atajos.html" %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Misión Emprende UDD — Bubble Map</title>
  <link rel="stylesheet" href="{% static 'css/estilo_bubblemap.css' %}">
  <style>
    .desafio-panel{
      width: 100%;
      max-width: 760px;
      margin: 14px auto 18px;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(0, 200, 255, 0.35);
      background: rgba(7, 38, 70, 0.78);
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }

    .desafio-toggle{
      width: 100%;
      border: none;
      background: transparent;
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-align: left;
    }

    .desafio-toggle-head{
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .desafio-etiqueta{
      font-size: 0.95rem;
      font-weight: 700;
      color: #00c8ff;
    }

    .desafio-titulo{
      font-size: 1.08rem;
      font-weight: 700;
      color: #ffffff;
    }

    .desafio-icono{
      font-size: 1rem;
      font-weight: 800;
      color: #00c8ff;
    }

    .desafio-body{
      border-top: 1px solid rgba(255,255,255,.12);
      padding: 16px 18px 18px;
    }

    .desafio-descripcion{
      margin: 0;
      color: #d9e6f2;
      line-height: 1.5;
      font-size: 0.98rem;
    }
  </style>
</head>
<body>
  <main class="bubblemap-container">
    <h1>💭 Bubble Map — Genera tus ideas</h1>
    <p class="subtitle">Escribe palabras clave relacionadas con tu persona del desafío.</p>

    <section class="desafio-panel">
      <button type="button" class="desafio-toggle" id="desafioToggle">
        <div class="desafio-toggle-head">
          <span class="desafio-etiqueta">Desafío seleccionado</span>
          <strong class="desafio-titulo" id="desafioNombre">{{ desafio_nombre_actual }}</strong>
        </div>
        <span class="desafio-icono" id="desafioIcono">▼</span>
      </button>

      <div class="desafio-body" id="desafioBody" hidden>
        <p class="desafio-descripcion" id="desafioDescripcion">{{ desafio_descripcion_actual }}</p>
      </div>
    </section>

    <section class="bubbles">
      <div class="bubble central">
        <img src="{% static 'images/personas.png' %}" alt="Persona" />
      </div>

      <div class="bubble"><textarea placeholder="¿Qué le gusta?"></textarea></div>
      <div class="bubble"><textarea placeholder="¿Qué siente?"></textarea></div>
      <div class="bubble"><textarea placeholder="¿Qué obstáculos tiene?"></textarea></div>
      <div class="bubble"><textarea placeholder="¿Qué dicen los demás?"></textarea></div>
      <div class="bubble"><textarea placeholder="Hobbies"></textarea></div>
      <div class="bubble"><textarea placeholder="Otros"></textarea></div>
    </section>

    <footer class="footer-actions"></footer>
  </main>

  <script>
    const STORAGE_KEY = "bubblemap_data";
    const SESSION_KEY = "browser_session_id";

    function uuidv4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    const currentSession = sessionStorage.getItem("my_session_id") ||
      (
        window.crypto && typeof window.crypto.randomUUID === "function"
          ? window.crypto.randomUUID()
          : uuidv4()
      );

    sessionStorage.setItem("my_session_id", currentSession);

    const lastSession = localStorage.getItem(SESSION_KEY);

    if (lastSession && lastSession !== currentSession) {
      localStorage.removeItem(STORAGE_KEY);
    }

    localStorage.setItem(SESSION_KEY, currentSession);

    document.addEventListener("DOMContentLoaded", () => {
      const bubbles = document.querySelectorAll(".bubble textarea");
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

      bubbles.forEach((area, i) => {
        if (saved[i]) area.value = saved[i];
      });

      bubbles.forEach((area, i) => {
        area.addEventListener("input", () => {
          const data = {};
          bubbles.forEach((a, idx) => data[idx] = a.value.trim());
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        });
      });

      const toggle = document.getElementById("desafioToggle");
      const body = document.getElementById("desafioBody");
      const icono = document.getElementById("desafioIcono");

      if (toggle && body && icono) {
        toggle.addEventListener("click", () => {
          const abierto = !body.hasAttribute("hidden");

          if (abierto) {
            body.setAttribute("hidden", "hidden");
            icono.textContent = "▼";
          } else {
            body.removeAttribute("hidden");
            icono.textContent = "▲";
          }
        });
      }
    });
  </script>

  {% include "includes/sincronizacion_fase.html" %}
</body>
</html>
