{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habilidades de Misión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/estilo_habilidades_intro.css' %}">
</head>
<body>

<div class="root" id="root">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-badge">CLASIFICADO</div>
      <div class="tb-title">HABILIDADES DE MISIÓN</div>
    </div>
    <div class="tb-pips" id="pips"></div>
  </div>

  <div class="body">
    <div class="panel">
      <div class="panel-empty" id="pempty">
        <div class="pe-icon">📍</div>
        <div class="pe-text">SELECCIONA<br>EL PUNTO<br>EN EL MAPA</div>
      </div>

      <div class="panel-card" id="pcard">
        <div class="pc-header">
          <div class="pc-em" id="pc-em"></div>
          <div class="pc-name" id="pc-name"></div>
          <div class="pc-sub" id="pc-sub"></div>
        </div>

        <div class="pc-body">
          <div class="pc-desc" id="pc-desc"></div>
          <div class="pc-pills" id="pc-pills"></div>
        </div>

        <div class="pc-footer">
          <button class="pc-btn" id="pc-btn" onclick="markDone()">[ ENTENDIDO ]</button>
        </div>
      </div>
    </div>

    <div class="map-wrap" id="map-wrap">
      <svg class="msvg" id="msvg"></svg>
      <div class="pdot" id="pdot"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="bt-hint" id="bt-hint">// VISITA TODOS LOS PUNTOS PARA ACTIVAR LA MISIÓN</div>
    <a href="{% url 'bienvenida' %}" class="bt-btn" id="bt-btn">▶ INICIAR MISIÓN</a>
  </div>
</div>

<div class="habilidad-overlay" id="habilidadOverlay">
  <div class="habilidad-box">
    <div class="habilidad-label">HABILIDAD ACTIVADA</div>
    <h1 id="habilidadTitulo">EMPATÍA</h1>
    <video id="habilidadVideo" muted playsinline preload="auto"></video>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="{% static 'sounds/musica_habilidades.mp3' %}" type="audio/mpeg">
</audio>

<script src="{% static 'js/mapa_agente.js' %}"></script>

<script>
  const videosHabilidades = {
    "trabajo en equipo": "{% static 'videos/TeamWork.mp4' %}",
    "empatía": "{% static 'videos/Empatia.mp4' %}",
    "empatia": "{% static 'videos/Empatia.mp4' %}",
    "creatividad": "{% static 'videos/Creatividad.mp4' %}",
    "comunicación": "{% static 'videos/Comunicacion.mp4' %}",
    "comunicacion": "{% static 'videos/Comunicacion.mp4' %}",
    "apoyo": "{% static 'videos/Apoyo.mp4' %}"
  };

  function normalizarTexto(texto) {
    return texto
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function mostrarAnimacionHabilidad(nombre) {
    const overlay = document.getElementById("habilidadOverlay");
    const titulo = document.getElementById("habilidadTitulo");
    const video = document.getElementById("habilidadVideo");

    const clave = normalizarTexto(nombre);
    const src = videosHabilidades[clave];

    if (!src) return;

    titulo.textContent = nombre.toUpperCase();
    video.pause();
    video.currentTime = 0;
    video.src = src;

    overlay.classList.add("show");

    video.play().catch(() => {
      setTimeout(cerrarAnimacionHabilidad, 2600);
    });

    video.onended = cerrarAnimacionHabilidad;
  }

  function cerrarAnimacionHabilidad() {
    const overlay = document.getElementById("habilidadOverlay");
    const video = document.getElementById("habilidadVideo");

    overlay.classList.remove("show");
    video.pause();
    video.currentTime = 0;
  }

  document.addEventListener("click", function(event) {
    const nodo = event.target.closest(".nd");
    if (!nodo || nodo.classList.contains("locked")) return;

    const label = nodo.querySelector(".nd-lbl");
    if (!label) return;

    setTimeout(() => {
      mostrarAnimacionHabilidad(label.textContent);
    }, 120);
  });
</script>

</body>
</html>
