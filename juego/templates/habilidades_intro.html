{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habilidades de Misión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/estilo_habilidades_intro.css' %}">
</head>
<body>

<div class="root" id="root">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-badge">CLASIFICADO</div>
      <div class="tb-title">HABILIDADES DE MISIÓN</div>
    </div>
    <div class="tb-pips" id="pips"></div>
  </div>

  <div class="body">

    <!-- PANEL IZQUIERDA -->
    <div class="panel">
      <div class="panel-empty" id="pempty">
        <div class="pe-icon">📍</div>
        <div class="pe-text">SELECCIONA<br>EL PUNTO<br>EN EL MAPA</div>
      </div>
      <div class="panel-card" id="pcard">
        <div class="pc-header">
          <div class="pc-em"   id="pc-em"></div>
          <div class="pc-name" id="pc-name"></div>
          <div class="pc-sub"  id="pc-sub"></div>
        </div>
        <div class="pc-body">
          <div class="pc-desc"  id="pc-desc"></div>
          <div class="pc-pills" id="pc-pills"></div>
        </div>
        <div class="pc-footer">
          <button class="pc-btn" id="pc-btn" onclick="markDone()">[ ENTENDIDO ]</button>
        </div>
      </div>
    </div>

    <!-- MAPA DERECHA -->
    <div class="map-wrap" id="map-wrap">
      <svg class="msvg" id="msvg"></svg>
      <div class="pdot" id="pdot"></div>
    </div>

  </div>

  <div class="bottom">
    <div class="bt-hint" id="bt-hint">// VISITA TODOS LOS PUNTOS PARA ACTIVAR LA MISIÓN</div>
    <a href="{% url 'bienvenida' %}" class="bt-btn" id="bt-btn">▶ INICIAR MISIÓN</a>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="{% static 'sounds/musica_habilidades.mp3' %}" type="audio/mpeg">
</audio>

<script src="{% static 'js/mapa_agente.js' %}"></script>
</body>
</html>
