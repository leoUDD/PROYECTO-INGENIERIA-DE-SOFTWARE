{% if not preview_profesor %}
<script>
  const sesionId = "{{ grupo.sesion.idsesion }}";

  function normalizar(ruta) {
    if (!ruta) return "/";
    return ruta.endsWith("/") ? ruta : ruta + "/";
  }

  async function revisarPantallaProfesor() {
    try {
      const res = await fetch(`/sesion/${sesionId}/estado/`);
      const data = await res.json();

      const actual = normalizar(window.location.pathname);
      const destino = normalizar(data.rutaAlumno);

      if (actual !== destino) {
        window.location.href = destino;
      }
    } catch (e) {
      console.error("Error sincronizando pantalla:", e);
    }
  }

  setInterval(revisarPantallaProfesor, 1500);
  revisarPantallaProfesor();
</script>
{% endif %}
