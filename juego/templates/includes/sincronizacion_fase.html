<script>
  (function () {
    async function revisarEstadoSesion() {
      try {
        const sesionId = "{{ grupo.sesion.idsesion }}";
        if (!sesionId) return;

        const res = await fetch(`/sesion/${sesionId}/estado/`);
        const data = await res.json();

        window.__sesionEstado = data;
        window.dispatchEvent(new CustomEvent("sesion-estado", { detail: data }));

        const destino = data.rutaAlumno;
        if (destino && window.location.pathname !== destino) {
          window.location.href = destino;
        }
      } catch (error) {
        console.error("Error sincronizando fase:", error);
      }
    }

    setInterval(revisarEstadoSesion, 1500);
    revisarEstadoSesion();
  })();
</script>
