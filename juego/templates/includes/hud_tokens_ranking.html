<style>
  .hud-tokens-ranking {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: Poppins, Arial, sans-serif;
  }

  .hud-team-box,
  .hud-token-box,
  .hud-ranking-btn {
    border: 1px solid rgba(0, 200, 255, .45);
    background: rgba(7, 21, 43, .88);
    color: white;
    border-radius: 999px;
    padding: 9px 14px;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
    backdrop-filter: blur(6px);
  }

  .hud-team-box {
    max-width: 260px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #E6EEF8;
    border-color: rgba(255, 122, 26, .5);
    background:
      linear-gradient(90deg, rgba(255,122,26,.16), rgba(7,21,43,.9));
  }

  .hud-team-label {
    color: #FF7A1A;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .hud-team-name {
    max-width: 145px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #ffffff;
    font-size: 13px;
  }

  .hud-token-box {
    color: #ffffff;
  }

  .hud-ranking-btn {
    cursor: pointer;
    font-family: inherit;
  }

  .hud-ranking-btn:hover,
  .hud-team-box:hover,
  .hud-token-box:hover {
    box-shadow:
      0 8px 20px rgba(0,0,0,.25),
      0 0 16px rgba(0,200,255,.25);
  }

  .hud-ranking-panel {
    position: fixed;
    top: 62px;
    right: 14px;
    z-index: 9999;
    width: min(340px, calc(100vw - 28px));
    background: rgba(7, 21, 43, .96);
    color: white;
    border: 1px solid rgba(0, 200, 255, .35);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 12px 28px rgba(0,0,0,.35);
    display: none;
    font-family: Poppins, Arial, sans-serif;
  }

  .hud-ranking-panel.visible {
    display: block;
  }

  .hud-ranking-panel h3 {
    margin: 0 0 10px;
    font-size: 1rem;
    color: #00c8ff;
  }

  .hud-ranking-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,.12);
    font-size: .92rem;
  }

  .hud-ranking-row:last-child {
    border-bottom: none;
  }

  .hud-ranking-row.mi-grupo {
    color: #FFDC9C;
  }

  .hud-ranking-empty {
    color: rgba(255,255,255,.72);
    font-size: .9rem;
  }

  @media (max-width: 760px) {
    .hud-tokens-ranking {
      top: 8px;
      right: 8px;
      transform: scale(.9);
      transform-origin: top right;
    }

    .hud-team-box {
      max-width: 190px;
    }

    .hud-team-name {
      max-width: 92px;
    }

    .hud-ranking-panel {
      top: 56px;
      right: 8px;
    }
  }

  @media (max-width: 520px) {
    .hud-tokens-ranking {
      left: 8px;
      right: 8px;
      width: calc(100vw - 16px);
      justify-content: flex-end;
      gap: 6px;
      transform: none;
    }

    .hud-team-box,
    .hud-token-box,
    .hud-ranking-btn {
      padding: 7px 10px;
      font-size: 12px;
    }

    .hud-team-box {
      max-width: 150px;
    }

    .hud-team-label {
      display: none;
    }

    .hud-team-name {
      max-width: 95px;
      font-size: 12px;
    }

    .hud-ranking-btn {
      max-width: 96px;
      overflow: hidden;
      white-space: nowrap;
    }

    .hud-ranking-panel {
      top: 50px;
      left: 8px;
      right: 8px;
      width: auto;
    }
  }
</style>

<div
  class="hud-tokens-ranking"
  data-sesion-id="{{ grupo.sesion.idsesion|default:'' }}"
  data-grupo-id="{{ grupo.idgrupo|default:'' }}"
>
  <div class="hud-team-box" title="{{ grupo.nombregrupo|default:'Escuadrón sin nombre' }}">
    <span class="hud-team-label">Escuadrón</span>
    <span class="hud-team-name" id="hudTeamName">
      {{ grupo.nombregrupo|default:"Sin nombre" }}
    </span>
  </div>

  <div class="hud-token-box">
    🪙 <span id="hudTokens">--</span>
  </div>

  <button type="button" id="hudRankingBtn" class="hud-ranking-btn">
    🏆 Ranking
  </button>
</div>

<div id="hudRankingPanel" class="hud-ranking-panel">
  <h3>Ranking actual</h3>
  <div id="hudRankingLista">
    Cargando...
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const hud = document.querySelector(".hud-tokens-ranking");
    const sesionId = hud?.dataset?.sesionId;
    const grupoId = hud?.dataset?.grupoId;

    const teamNameEl = document.getElementById("hudTeamName");
    const tokensEl = document.getElementById("hudTokens");
    const btn = document.getElementById("hudRankingBtn");
    const panel = document.getElementById("hudRankingPanel");
    const lista = document.getElementById("hudRankingLista");

    if (!sesionId || !grupoId) return;

    btn?.addEventListener("click", () => {
      panel?.classList.toggle("visible");
    });

    document.addEventListener("click", (event) => {
      if (!panel || !btn || !hud) return;

      const clickDentroHud = hud.contains(event.target);
      const clickDentroPanel = panel.contains(event.target);

      if (!clickDentroHud && !clickDentroPanel) {
        panel.classList.remove("visible");
      }
    });

    function escaparHtml(texto) {
      return String(texto ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function actualizarHud() {
      try {
        const res = await fetch(`/sesion/${sesionId}/estado/`, {
          credentials: "same-origin",
          cache: "no-store"
        });

        if (!res.ok) return;

        const data = await res.json();
        const grupos = data.grupos || [];

        const miGrupo = grupos.find(g => Number(g.id) === Number(grupoId));

        if (miGrupo) {
          if (tokensEl) {
            tokensEl.textContent = miGrupo.tokens ?? 0;
          }

          if (teamNameEl) {
            teamNameEl.textContent = miGrupo.nombre || "Sin nombre";
            teamNameEl.parentElement?.setAttribute("title", miGrupo.nombre || "Escuadrón sin nombre");
          }
        }

        const ordenados = [...grupos].sort((a, b) => Number(b.tokens || 0) - Number(a.tokens || 0));

        if (lista) {
          if (!ordenados.length) {
            lista.innerHTML = `<div class="hud-ranking-empty">Aún no hay grupos en ranking.</div>`;
            return;
          }

          lista.innerHTML = ordenados.map((g, index) => {
            const esMiGrupo = Number(g.id) === Number(grupoId);
            const nombreSeguro = escaparHtml(g.nombre || "Sin nombre");
            const tokens = Number(g.tokens || 0);

            return `
              <div class="hud-ranking-row ${esMiGrupo ? "mi-grupo" : ""}">
                <span>${index + 1}. ${nombreSeguro}</span>
                <strong>${tokens} 🪙</strong>
              </div>
            `;
          }).join("");
        }
      } catch (error) {
        console.error("Error actualizando HUD:", error);
      }
    }

    actualizarHud();
    setInterval(actualizarHud, 3000);
  });
</script>
