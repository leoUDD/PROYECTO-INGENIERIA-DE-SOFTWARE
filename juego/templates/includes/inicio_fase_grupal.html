<div class="inicio-fase-card" id="inicio-fase-card">
  <h3 class="inicio-fase-titulo">{{ titulo_inicio_fase|default:"Antes de comenzar" }}</h3>
  <p class="inicio-fase-texto">
    {{ instruccion_inicio_fase|default:"Cuando todos los equipos estén listos, la actividad comenzará automáticamente." }}
  </p>

  <button type="button" id="btn-listo-fase" class="btn btn-primary">
    Listo para comenzar
  </button>

  <p id="texto-espera-fase" class="mt-2 mb-0">
    Esperando a los demás equipos...
  </p>

  <p id="contador-listos-fase" class="mt-2 mb-0 small text-muted"></p>
</div>

<style>
.inicio-fase-card {
  background: #ffffff;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
}

.inicio-fase-titulo {
  margin: 0 0 8px 0;
}

.inicio-fase-texto {
  margin-bottom: 14px;
}

.fase-bloqueada {
  filter: blur(6px);
  pointer-events: none;
  user-select: none;
  opacity: .72;
  transition: all .3s ease;
}

.fase-activa {
  filter: none;
  pointer-events: auto;
  user-select: auto;
  opacity: 1;
  transition: all .3s ease;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const sesionId = "{{ grupo.sesion.idsesion }}";
  const grupoId = "{{ grupo.idgrupo }}";
  const contenido = document.getElementById("contenido-fase");
  const boton = document.getElementById("btn-listo-fase");
  const textoEspera = document.getElementById("texto-espera-fase");
  const contador = document.getElementById("contador-listos-fase");

  if (!contenido) return;

  function activarFase() {
    contenido.classList.remove("fase-bloqueada");
    contenido.classList.add("fase-activa");

    const card = document.getElementById("inicio-fase-card");
    if (card) card.style.display = "none";
  }

  function bloquearFase() {
    contenido.classList.remove("fase-activa");
    contenido.classList.add("fase-bloqueada");
  }

  async function revisarEstado() {
    try {
      const resp = await fetch(`/sesion/${sesionId}/estado/`, {
        cache: "no-store"
      });
      const data = await resp.json();

      if (contador) {
        contador.textContent = `Listos: ${data.listosInicio || 0} / ${data.totalListosInicio || 0}`;
      }

      if (data.inicioFaseHabilitado) {
        activarFase();
      } else {
        bloquearFase();
      }
    } catch (e) {
      console.error("Error consultando estado de sesión:", e);
    }
  }

  if (boton) {
    boton.addEventListener("click", async function () {
      boton.disabled = true;
      boton.textContent = "Listo enviado";

      try {
        const resp = await fetch(`/grupo/${grupoId}/marcar-listo/`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
          },
          body: JSON.stringify({})
        });

        const data = await resp.json();

        if (contador) {
          contador.textContent = `Listos: ${data.listos || 0} / ${data.total || 0}`;
        }

        if (data.inicio_fase_habilitado) {
          activarFase();
        } else if (textoEspera) {
          textoEspera.style.display = "block";
        }
      } catch (e) {
        console.error("Error marcando listo:", e);
      }
    });
  }

  bloquearFase();
  revisarEstado();
  setInterval(revisarEstado, 2000);
});
</script>
