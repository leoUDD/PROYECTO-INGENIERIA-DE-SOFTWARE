{% load static %}

<div class="db-badge" role="region" aria-label="Desafío seleccionado">
  <button
    type="button"
    class="db-chip"
    id="dbToggle"
    aria-expanded="false"
    aria-controls="dbDrawer"
  >
    <span class="db-chip-icon" aria-hidden="true">🎯</span>

    <span class="db-chip-text">
      <small>Desafío seleccionado</small>
      <strong id="dbTitle">
        {{ desafio_nombre_actual|default:"Desafío no seleccionado" }}
      </strong>
      <small id="dbShort" class="db-ellipsis--2lines">
        {{ desafio_descripcion_actual|default:"Aún no hay descripción disponible para este desafío." }}
      </small>
    </span>

    <span class="db-chip-cta" aria-hidden="true">▼</span>
  </button>

  <div class="db-drawer" id="dbDrawer" hidden>
    <p class="db-desc" id="dbDesc">
      {{ desafio_descripcion_actual|default:"Aún no hay descripción disponible para este desafío." }}
    </p>

    <div class="db-actions">
      <button type="button" class="btn-mini" id="dbClose">Cerrar</button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="{% static 'css/estilo_desafio_badge.css' %}">
<script src="{% static 'js/desafio_badge.js' %}"></script>
