<script>
  async function revisarEstado() {
    try {
      const sesionId = "{{ grupo.sesion.idsesion }}";
      const res = await fetch(`/sesion/${sesionId}/estado/`);
      const data = await res.json();
      const fase = data.faseActual;

      const estadoEl = document.getElementById("estado");
      if (estadoEl) {
        estadoEl.innerText = `Fase actual: ${fase}`;
      }

      if (fase === "lobby") return;

      if (["f1_intro", "f1_juego"].includes(fase)) {
        window.location.href = "{% url 'trabajoenequipo' %}";
        return;
      }

      if (fase === "f1_conocidos") {
        window.location.href = "{% url 'conocidos' %}";
        return;
      }

      if (fase === "f1_prompt") {
        window.location.href = "{% url 'promptconocidos' %}";
        return;
      }

      if (fase === "f1_sopa") {
        window.location.href = "{% url 'minijuego1' %}";
        return;
      }

      if (["f2_intro", "f2_juego"].includes(fase)) {
        window.location.href = "{% url 'tematicas' %}";
        return;
      }

      if (fase === "f2_bubblemap") {
        window.location.href = "{% url 'bubblemap' %}";
        return;
      }

      if (["f3_intro", "f3_juego"].includes(fase)) {
        window.location.href = "{% url 'lego' %}";
        return;
      }

      if (["f4_intro", "f4_juego"].includes(fase)) {
        window.location.href = "{% url 'pitch' %}";
        return;
      }

      if (fase === "reflexion") {
        window.location.href = "{% url 'reflexion' %}";
      }

    } catch (error) {
      console.error("Error en revisarEstado:", error);
    }
  }

  setInterval(revisarEstado, 2000);
  revisarEstado();
</script>
