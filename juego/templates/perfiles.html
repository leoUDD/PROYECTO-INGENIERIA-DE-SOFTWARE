{% load static %}
{% include "atajos.html" %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Misión Emprende UDD — Perfiles</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilo_perfiles.css' %}" />
</head>
<body>
  <main class="phone" role="region" aria-label="Pantalla de perfiles">

    <!--
      SPACER INVISIBLE:
      Mismo GIF pero invisible (opacity:0).
      Su único trabajo es darle altura real a .phone
      para que position:absolute funcione correctamente.
      El GIF visible es background-image de .phone.
    -->
    <img
      class="gif-spacer"
      src="{% static 'images/mision_emprende_1536x1900_flicker.gif' %}"
      alt=""
      aria-hidden="true"
    />

    <!-- Círculos superpuestos sobre el GIF de fondo -->
    <section class="perfiles">
      <div class="perfil">
        <a href="{% url 'bienvenida' %}">
          <img src="{% static 'images/alumno.png' %}" alt="Alumno">
        </a>
        <p class="perfil-texto">Alumno</p>
      </div>
      <div class="perfil">
        <a href="dashboardprofesor">
          <img src="{% static 'images/proofe.png' %}" alt="Profesor">
        </a>
        <p class="perfil-texto">Profesor</p>
      </div>
      <div class="perfil">
        <a href="dashboardadmin">
          <img src="{% static 'images/admin.png' %}" alt="Administrador">
        </a>
        <p class="perfil-texto">Administrador</p>
      </div>
    </section>

  </main>
</body>
</html>
